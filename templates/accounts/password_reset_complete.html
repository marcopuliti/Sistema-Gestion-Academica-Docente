<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña restablecida — Gestión Docente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>body { background-color: #f4f6f9; } .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.1); }</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
      <div class="card">
        <div class="card-body p-4 text-center">
          <i class="bi bi-check-circle-fill display-4 text-success"></i>
          <h5 class="mt-3 fw-bold">Contraseña restablecida</h5>
          <p class="text-muted small">Tu contraseña fue actualizada correctamente. Ya podés iniciar sesión.</p>
          <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ir al login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
