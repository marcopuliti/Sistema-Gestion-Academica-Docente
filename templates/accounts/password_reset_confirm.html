<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — DELTA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    .card-header { background-color: #1a3a5c; color: #fff; }
    .btn-primary { background-color: #2e86c1; border-color: #2e86c1; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
      <div class="card">
        <div class="card-header text-center py-3">
          <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Nueva contraseña</h5>
        </div>
        <div class="card-body p-4">
          {% if validlink %}
          <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              <input type="password" name="{{ field.html_name }}" class="form-control" required>
              {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-check-lg me-2"></i>Guardar nueva contraseña
            </button>
          </form>
          {% else %}
          <div class="alert alert-danger">
            El enlace es inválido o ya fue utilizado. Solicitá uno nuevo.
          </div>
          <a href="{% url 'accounts:password_reset' %}" class="btn btn-outline-primary w-100">Solicitar nuevo enlace</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
