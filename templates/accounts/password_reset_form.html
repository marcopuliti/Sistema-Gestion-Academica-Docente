<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Gestión Docente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    .card-header { background-color: #1a3a5c; color: #fff; }
    .btn-primary { background-color: #2e86c1; border-color: #2e86c1; }
    .btn-primary:hover { background-color: #1a3a5c; border-color: #1a3a5c; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <i class="bi bi-mortarboard-fill display-4" style="color: #1a3a5c;"></i>
        <h3 class="mt-2 fw-bold" style="color: #1a3a5c;">Gestión Docente</h3>
      </div>
      <div class="card">
        <div class="card-header text-center py-3">
          <h5 class="mb-0"><i class="bi bi-key me-2"></i>Restablecer contraseña</h5>
        </div>
        <div class="card-body p-4">
          <p class="text-muted small mb-3">
            Ingresá tu email institucional (@unsl.edu.ar) y te enviaremos un enlace para restablecer tu contraseña.
          </p>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Email institucional</label>
              <input type="email" name="email" class="form-control" placeholder="usuario@unsl.edu.ar" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-send me-2"></i>Enviar enlace
            </button>
          </form>
        </div>
        <div class="card-footer text-center py-3">
          <a href="{% url 'accounts:login' %}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Volver al login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
